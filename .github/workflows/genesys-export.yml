name: Genesys Cloud Configuration Export
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  export-genesys:
    runs-on: ubuntu-latest

    env:
      GENESYSCLOUD_CLIENT_ID: ${{ secrets.GENESYSCLOUD_CLIENT_ID }}
      GENESYSCLOUD_CLIENT_SECRET: ${{ secrets.GENESYSCLOUD_CLIENT_SECRET }}
      GENESYSCLOUD_REGION: ${{ secrets.GENESYSCLOUD_REGION }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.4"

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: terraform apply -auto-approve
        env:
          GENESYSCLOUD_CLIENT_ID: ${{ secrets.GENESYSCLOUD_CLIENT_ID }}
          GENESYSCLOUD_CLIENT_SECRET: ${{ secrets.GENESYSCLOUD_CLIENT_SECRET }}
          GENESYSCLOUD_REGION: ${{ secrets.GENESYSCLOUD_REGION }}

      - name: Commit and Push Exported Files
        run: |
          git config --global user.name "github-actions[bot]" 
          git config --global user.email "github-actions[bot]@users.noreply.github.com" 
          git add genesyscloud-export/
          if git diff-index --quiet HEAD; then
            echo "No changes detected in the Genesys export."
          else
            git commit -m "Automated Genesys Cloud Export: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            fi
          git
